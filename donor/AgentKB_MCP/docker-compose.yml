# Verified Developer KB Pro - Docker Compose Configuration
# For local development and testing

version: '3.8'

services:
  # Main API service
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://kbpro:password@postgres:5432/kbpro
      - REDIS_URL=redis://redis:6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - FILE_SEARCH_STORE_ID=${FILE_SEARCH_STORE_ID}
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - LOG_FORMAT=console
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./kb_files:/app/kb_files:ro  # Production KB (read-only)
      - ./kb_staging:/app/kb_staging  # Staging KB (writable)
      - ./stack_packs:/app/stack_packs:ro
      - ./locks:/app/locks
      - ./alerts:/app/alerts
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Research worker
  worker:
    build: .
    command: python -m app.worker
    environment:
      - DATABASE_URL=postgresql://kbpro:password@postgres:5432/kbpro
      - REDIS_URL=redis://redis:6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - FILE_SEARCH_STORE_ID=${FILE_SEARCH_STORE_ID}
      - WORKER_ID=worker-1
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    depends_on:
      - api
      - postgres
      - redis
    volumes:
      - ./kb_staging:/app/kb_staging
      - ./alerts:/app/alerts
      - ./logs:/app/logs
    restart: unless-stopped

  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=kbpro
      - POSTGRES_USER=kbpro
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kbpro"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # Grafana for dashboards
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

