# ─────────────────────────────────────────────────────────────────────────────
# Chain Overrides (Optional)
# ─────────────────────────────────────────────────────────────────────────────
# Per-lane chain preferences. If not set, uses model_catalog.py defaults.
# Models from any provider can be mixed in a chain.
# Use provider prefix for OpenRouter: "openrouter:deepseek/deepseek-r1"
# Ollama Cloud models use their native names: "nemotron-3-super"

# [chain_overrides.reasoning]
# models = ["nemotron-3-super", "cogito-2.1:671b-cloud", "openrouter:deepseek/deepseek-r1"]

# [chain_overrides.coding]
# models = ["devstral-2:123b-cloud", "qwen3-coder-next:cloud", "openrouter:anthropic/claude-sonnet-4"]

# [chain_overrides.analysis]
# models = ["deepseek-v3.2:cloud", "openrouter:google/gemini-2.5-flash"]

# [chain_overrides.ethics]
# models = ["deepseek-v3.2:cloud", "openrouter:anthropic/claude-sonnet-4"]


# ─────────────────────────────────────────────────────────────────────────────
# Provider Preferences (OpenRouter provider routing)
# ─────────────────────────────────────────────────────────────────────────────
# Controls how OpenRouter routes requests across backend providers.
# Maps directly to the OpenRouter `provider` object in the request body.
# See: https://openrouter.ai/docs/features/provider-routing

[provider_preferences]
# Require the backend provider to support all parameters we send
# (e.g., tool_choice, response_format). If false, some params may be silently ignored.
require_parameters = true

# Data collection policy: "allow" or "deny"
# "deny" = opt out of training data collection at the provider level.
data_collection = "deny"

# Sort strategy: "price" | "throughput" | "latency"
# For governed paths, "price" keeps costs deterministic.
# For latency-sensitive paths, use "throughput" or "latency".
sort = "price"

# Allow fallback to other providers if the primary is unavailable
allow_fallbacks = true

# Optional: restrict to specific quantization levels
# quantizations = ["fp16", "bf16"]

# Optional: max price caps (USD per token). Uncomment and adjust as needed.
# [provider_preferences.max_price]
# prompt = "0.00003"
# completion = "0.00006"

# Optional: provider whitelist — only use these providers
# Uncomment to restrict to specific backend providers.
# only = ["Anthropic", "Google", "DeepInfra", "Together"]

# Optional: provider blacklist — never use these providers
# ignore = ["SomeProvider"]


# ─────────────────────────────────────────────────────────────────────────────
# Governed Path Controls
# ─────────────────────────────────────────────────────────────────────────────
# Settings for knowledge-critical / governed execution paths.

[governed_paths]
# Auto/free router models are NEVER allowed for governed knowledge paths.
# This cannot be overridden — it is a hard safety constraint.
excluded_routers = ["openrouter/auto", "openrouter/free"]

# When true, verify that the response model matches the requested model.
# Reject responses where the model was silently re-routed.
strict_model_verification = true

# When true, only models that pass the availability cache check are used.
require_live_availability = true

# ─── Response quality gates (apply to ALL providers incl. Ollama) ────────────

# Reject truncated responses (done_reason="length" / finish_reason="length").
# Truncated output is unreliable for knowledge absorption.
reject_truncated = true

# Minimum content length (chars) for governed paths. Responses shorter than
# this are rejected — prevents absorbing empty or trivially short answers.
min_content_chars = 1

# Require model name match between request and response.
# Ollama may append ":latest" suffix — that is allowed automatically.
require_model_match = true

# Require nonzero token counts in response metadata.
# Zero eval_count with non-empty content indicates broken token counting.
require_nonzero_tokens = true
