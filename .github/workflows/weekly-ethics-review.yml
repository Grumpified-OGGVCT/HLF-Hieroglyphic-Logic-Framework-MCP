# в•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—
# в•‘  HLF вЂ” Weekly Ethics Alignment Review                                        в•‘
# в•‘                                                                              в•‘
# в•‘  Routing policy: packaged named ethics chain                                 в•‘
# в•‘  Why: ethics review still benefits from reasoning, but issue creation is    в•‘
# в•‘        gated to concrete regressions in changed governance surfaces rather   в•‘
# в•‘        than recurring baseline philosophy reports or frozen model choices.   в•‘
# в•‘                                                                              в•‘
# в•‘  Triggers: Weekly Tuesday 02:00 UTC                                         в•‘
# в•‘  Output: GitHub Issue only when changed ethics surfaces produce an           в•‘
# в•‘          actionable, code-grounded finding                                  в•‘
# в•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ
name: "Weekly вЂ” Ethics Alignment Review (policy-routed ethics chain)"

on:
  schedule:
    - cron: "0 2 * * 2"   # Every Tuesday at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  ethics-review:
    name: "Ethics & ethos compliance review"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 30   # Last 30 commits for recent activity analysis

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]" --quiet

      - name: Run ethics compliance check
        run: |
          python .github/scripts/ethics_compliance_check.py > /tmp/ethics_report.json
          python -c "import json; d=json.load(open('/tmp/ethics_report.json')); print(d['summary_text'])"

      - name: Gather recent commit activity
        run: |
          git --no-pager log --oneline -20 > /tmp/recent_commits.txt
          git --no-pager diff HEAD~10 HEAD -- hlf_mcp/ governance/ > /tmp/recent_diff.txt 2>/dev/null || true
          echo "Recent commits:"
          cat /tmp/recent_commits.txt
          # Limit diff size
          head -c 20000 /tmp/recent_diff.txt > /tmp/recent_diff_truncated.txt

      - name: Detect relevant ethics/governance surface changes
        id: ethics_scope
        run: |
          git --no-pager diff --name-only HEAD~10 HEAD -- \
            governance/align_rules.json \
            hlf_mcp/hlf/ethics/ \
            hlf_mcp/hlf/compiler.py \
            hlf_mcp/hlf/runtime.py > /tmp/ethics_changed_files.txt 2>/dev/null || true
          cat /tmp/ethics_changed_files.txt
          if [ -s /tmp/ethics_changed_files.txt ]; then
            echo "has_relevant_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_relevant_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read ALIGN rules and ethics stubs
        run: |
          ALIGN_CONTENT=$(cat governance/align_rules.json 2>/dev/null || echo '{}')
          ETHICS_FILES=""
          for f in hlf_mcp/hlf/ethics/*.py; do
            if [ -f "$f" ]; then
              ETHICS_FILES="$ETHICS_FILES\n\n### $f\n$(cat $f)"
            fi
          done
          echo "$ALIGN_CONTENT" > /tmp/align_rules.txt
          printf "$ETHICS_FILES" > /tmp/ethics_stubs.txt

      - name: "Ethics chain вЂ” Current-change ethics review"
        if: steps.ethics_scope.outputs.has_relevant_changes == 'true'
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          ETHICS_STATUS=$(python -c "import json; d=json.load(open('/tmp/ethics_report.json')); print(d['summary_text'])")
          RECENT_COMMITS=$(cat /tmp/recent_commits.txt)
          RECENT_DIFF=$(cat /tmp/recent_diff_truncated.txt)
          CHANGED_FILES=$(cat /tmp/ethics_changed_files.txt)
          ALIGN_RULES=$(cat /tmp/align_rules.txt)
          ETHICS_STUBS=$(cat /tmp/ethics_stubs.txt)

          cat > /tmp/ethics_prompt.txt << PROMPT_EOF
          You are reviewing the HLF (Hieroglyphic Logic Framework) repository for ethics and ethos alignment.
          
          The HLF ethos mandates:
          1. PEOPLE FIRST вЂ” human privacy and work are private by default; no surveillance
          2. AI AS TOOL вЂ” AI serves humans, not the other way around
          3. TRANSPARENCY вЂ” all governance rules are in public files, not black-box
          4. HARD LAWS вЂ” constitutional constraints are enforced, not just recommended
          5. SELF-TERMINATION вЂ” system shuts down before allowing violations
          6. NON-OPPRESSIVE вЂ” enables creativity and legitimate research (red-hat path)

          Your task:
          A) Review only the changed ethics/governance/runtime/compiler surfaces
          B) Determine whether those current changes introduce an actionable ethos regression or governance gap
          C) If there is no concrete actionable finding in the changed surfaces, output exactly: NO_ACTIONABLE_FINDINGS
          D) If there is a finding, report only findings grounded in the provided changed files

          Do not generate philosophy-only backlog items from known baseline incompleteness.
          Do not include hidden reasoning or thinking traces.

          --- ETHICS MODULE STATUS ---
          ${ETHICS_STATUS}

          --- RELEVANT CHANGED FILES ---
          ${CHANGED_FILES}

          --- RECENT COMMITS (last 20) ---
          ${RECENT_COMMITS}

          --- RECENT DIFF (last 10 commits, truncated) ---
          ${RECENT_DIFF}

          --- ALIGN RULES ---
          ${ALIGN_RULES}

          --- ETHICS MODULE STUBS ---
          ${ETHICS_STUBS}
          PROMPT_EOF

          python .github/scripts/ollama_client.py \
            --chain "ethics" \
            --system "You are a constitutional AI ethics reviewer. Review current changed surfaces only, ground every finding in the provided code, and avoid turning standing philosophical gaps into recurring issues." \
            --prompt "@/tmp/ethics_prompt.txt" \
            --output /tmp/ethics_review.json \
            --temperature 0.1

          python -c "import json; d=json.load(open('/tmp/ethics_review.json')); print(d['content'])" > /tmp/ethics_review.md
          echo "Ethics review generated ($(wc -c < /tmp/ethics_review.md) chars)"

      - name: Write no-op ethics review placeholder
        if: steps.ethics_scope.outputs.has_relevant_changes != 'true'
        run: |
          cat > /tmp/ethics_review.json << 'EOF'
          {"content": "NO_ACTIONABLE_FINDINGS", "reason": "no_relevant_changes"}
          EOF
          echo "NO_ACTIONABLE_FINDINGS" > /tmp/ethics_review.md

      - name: Gate ethics issue creation
        id: ethics_gate
        run: |
          python << 'PYEOF'
          import os
          from pathlib import Path

          text = Path('/tmp/ethics_review.md').read_text(encoding='utf-8').strip()
          actionable = 'NO_ACTIONABLE_FINDINGS' not in text and 'No actionable findings' not in text
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"has_findings={'true' if actionable else 'false'}\n")
          PYEOF

      - name: Build issue body
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          WEEK=$(date +"%Y-W%V")
          ETHICS_STATUS=$(python -c "import json; d=json.load(open('/tmp/ethics_report.json')); print(d['summary_text'])")
          REVIEW=$(cat /tmp/ethics_review.md)

          cat > /tmp/ethics_issue.md << ISSUE_EOF
          ## вљ–пёЏ HLF Ethics Alignment Review вЂ” ${WEEK}

          **Reviewed by**: packaged named \`ethics\` chain (changed-surface ethics review)
          **Workflow**: [Weekly Ethics Review]($RUN_URL)

          > _This report is emitted only when changed governance/ethics/runtime surfaces produce a concrete actionable finding._

          ---

          ## рџ“Љ Ethics Compliance Status (machine check)

          \`\`\`
          ${ETHICS_STATUS}
          \`\`\`

          ---

          ## рџ§  AI Ethics Review (ethics chain)

          ISSUE_EOF

          echo "$REVIEW" >> /tmp/ethics_issue.md
          echo "" >> /tmp/ethics_issue.md
          echo "---" >> /tmp/ethics_issue.md
          echo "_This issue is auto-generated weekly. Close when the top ethics finding is resolved._" >> /tmp/ethics_issue.md

      - name: Build governed review contract
        if: always()
        run: |
          python .github/scripts/governed_review_contract.py \
            build-ethics-review \
            --ethics-report /tmp/ethics_report.json \
            --ethics-review /tmp/ethics_review.json \
            --output /tmp/governed_review.json

      - name: Emit normalized weekly artifact
        if: always()
        run: |
          python .github/scripts/emit_weekly_artifact.py \
            --source "weekly-ethics-review" \
            --output /tmp/weekly-ethics-review-artifact.json \
            --extra-json "/tmp/ethics_report.json:ethics_report" \
            --extra-json "/tmp/ethics_review.json:ethics_review" \
            --extra-json "/tmp/governed_review.json:governed_review"

      - name: Upload normalized weekly artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "weekly-ethics-review-${{ github.run_id }}"
          path: /tmp/weekly-ethics-review-artifact.json
          retention-days: 90

      - name: Create GitHub issue
        if: steps.ethics_scope.outputs.has_relevant_changes == 'true' && steps.ethics_gate.outputs.has_findings == 'true' && github.ref_name == github.event.repository.default_branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python .github/scripts/create_github_issue.py \
            --title "вљ–пёЏ [Ethics Review] HLF ethics alignment" \
            --body "@/tmp/ethics_issue.md" \
            --labels "ethics,governance,automated" \
            --conflict-labels "ethics" \
            --conflict-title-substrings "ethics review,ethics alignment"
