# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  HLF — Weekly Documentation Drift + Security Pattern Review                 ║
# ║                                                                              ║
# ║  Two parallel jobs using GitHub Actions matrix strategy (mini-swarm):       ║
# ║                                                                              ║
# ║  Job 1 — doc-accuracy: deterministic machine drift report                   ║
# ║    Why: documentation accuracy is a verification task, so issue creation    ║
# ║          should be driven by measured drift rather than inferred omissions.  ║
# ║                                                                              ║
# ║  Job 2 — security-patterns: deepseek-r1:14b (DeepSeek)                    ║
# ║    Best-in-class: Chain-of-thought adversarial reasoning                   ║
# ║    Why: Security review is thinking-intensive. Reasoning through "could     ║
# ║          an adversary bypass ALIGN rule X by doing Y?" requires explicit    ║
# ║          chain-of-thought, not just pattern matching.                       ║
# ║                                                                              ║
# ║  Triggers: Weekly Wednesday 02:00 UTC                                       ║
# ║  Output: Separate GitHub Issues per job                                     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
name: "Weekly — Doc Drift + Security Patterns (verified docs ∥ constrained security triage)"

on:
  schedule:
    - cron: "0 2 * * 3"   # Every Wednesday at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  # ── Job 1: Documentation accuracy ─────────────────────────────────────────────
  doc-accuracy:
    name: "Doc accuracy check (qwen3.5:cloud)"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]" --quiet

      - name: Run machine doc drift check
        run: |
          python .github/scripts/spec_drift_check.py > /tmp/doc_drift.json 2>&1 || true
          cat /tmp/doc_drift.json

      - name: Summarize deterministic doc drift
        id: doc_drift
        run: |
          python << 'PYEOF'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path('/tmp/doc_drift.json').read_text(encoding='utf-8'))
          actionable = []
          for finding in report.get('findings', []):
            if not finding.get('drift'):
              continue
            actionable.append(finding)

          lines = []
          if not actionable:
            lines.append('NO_ACTIONABLE_FINDINGS')
            lines.append('All measured documentation counts and spec bindings are aligned with the current packaged code.')
          else:
            lines.append('# Machine-verified documentation drift findings')
            for finding in actionable:
              lines.append(f"- **{finding['check']}**")
              if finding['check'] == 'readme_count_accuracy':
                drifts = finding.get('drifts', {})
                for key, values in drifts.items():
                  lines.append(
                    f"  - `{key}`: README claims {values['readme']}, packaged code reports {values['actual']}"
                  )
              elif finding['check'] == 'host_functions_json_vs_registry':
                if finding.get('only_in_json'):
                  lines.append(
                    f"  - Present only in governance JSON: {', '.join(finding['only_in_json'])}"
                  )
                if finding.get('only_in_registry'):
                  lines.append(
                    f"  - Present only in packaged registry: {', '.join(finding['only_in_registry'])}"
                  )
              elif finding['check'] == 'bytecode_spec_vs_op_enum':
                if finding.get('only_in_yaml'):
                  lines.append(
                    f"  - Present only in bytecode spec: {', '.join(finding['only_in_yaml'])}"
                  )
                if finding.get('only_in_py'):
                  lines.append(
                    f"  - Present only in bytecode enum: {', '.join(finding['only_in_py'])}"
                  )
                if finding.get('code_mismatches'):
                  lines.append('  - Opcode code mismatches detected between spec and enum.')

          Path('/tmp/doc_review.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
            fh.write(f"has_drift={'true' if actionable else 'false'}\n")
          PYEOF
          cat /tmp/doc_review.md

      - name: Create doc accuracy issue
        if: steps.doc_drift.outputs.has_drift == 'true' && github.ref_name == github.event.repository.default_branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          WEEK=$(date +"%Y-W%V")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DOC_REVIEW=$(cat /tmp/doc_review.md)

          cat > /tmp/doc_issue.md << ISSUE_EOF
          ## 📖 HLF Documentation Accuracy Review — ${WEEK}

          **Reviewed by**: machine-verified drift check
          **Workflow**: [Weekly Doc + Security Review]($RUN_URL)

          ---

          ## Findings

          ${DOC_REVIEW}

          ---
          _Auto-generated weekly. Close when all documentation corrections are merged._
          ISSUE_EOF

          python .github/scripts/create_github_issue.py \
            --title "📖 [Doc Audit] HLF documentation accuracy" \
            --body "@/tmp/doc_issue.md" \
            --labels "documentation,automated" \
            --conflict-labels "documentation" \
            --conflict-title-substrings "doc audit,documentation accuracy"

      - name: Build governed review contract
        if: always()
        run: |
          python .github/scripts/governed_review_contract.py \
            build-doc-accuracy \
            --doc-drift /tmp/doc_drift.json \
            --output /tmp/governed_review.json

      - name: Emit normalized doc artifact
        if: always()
        run: |
          python .github/scripts/emit_weekly_artifact.py \
            --source "weekly-doc-accuracy" \
            --output /tmp/weekly-doc-accuracy-artifact.json \
            --extra-json "/tmp/doc_drift.json:doc_drift" \
            --extra-json "/tmp/governed_review.json:governed_review"

      - name: Upload doc accuracy artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "weekly-doc-accuracy-${{ github.run_id }}"
          path: /tmp/weekly-doc-accuracy-artifact.json
          retention-days: 90

  # ── Job 2: Security pattern review ────────────────────────────────────────────
  security-patterns:
    name: "Security pattern review (deepseek-r1:14b)"
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]" --quiet

      - name: Gather security-relevant files
        run: |
          cat governance/align_rules.json > /tmp/security_context.txt 2>/dev/null || echo "{}" > /tmp/security_context.txt
          echo -e "\n\n=== COMPILER PASS 0 + PASS 4 ===" >> /tmp/security_context.txt
          python << 'PYEOF' >> /tmp/security_context.txt
          from pathlib import Path
          import re
          comp = Path("hlf_mcp/hlf/compiler.py")
          if comp.exists():
              text = comp.read_text(encoding="utf-8")
              # Extract pass 0 and pass 4
              pass0 = re.search(r"(?s)(# Pass 0.*?)(?=# Pass [12]|\Z)", text)
              pass4 = re.search(r"(?s)(# Pass 4.*?)(?=# Pass [5]|\ndef |\Z)", text)
              if pass0: print(f"PASS 0 (Homoglyph):\n{pass0.group(1)[:3000]}")
              if pass4: print(f"\nPASS 4 (ALIGN Ledger):\n{pass4.group(1)[:3000]}")
          PYEOF
          echo -e "\n\n=== RUNTIME HOST DISPATCH (HTTP + FILE) ===" >> /tmp/security_context.txt
          python << 'PYEOF' >> /tmp/security_context.txt
          from pathlib import Path
          import re
          rt = Path("hlf_mcp/hlf/runtime.py")
          if rt.exists():
              text = rt.read_text(encoding="utf-8")
              http_m = re.search(r"(?s)(def.*?http.*?\n(?:.*?\n){0,30})", text, re.IGNORECASE)
              file_m = re.search(r"(?s)(def.*?file.*?\n(?:.*?\n){0,30})", text, re.IGNORECASE)
              if http_m: print(f"HTTP DISPATCH:\n{http_m.group(1)}")
              if file_m: print(f"\nFILE DISPATCH:\n{file_m.group(1)}")
          PYEOF
          head -c 15000 /tmp/security_context.txt > /tmp/security_context_trunc.txt
          echo "Security context: $(wc -c < /tmp/security_context_trunc.txt) chars"

      - name: "deepseek-r1:14b — Adversarial security triage"
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          SEC_CONTEXT=$(cat /tmp/security_context_trunc.txt)

          python .github/scripts/ollama_client.py \
            --model "deepseek-r1:14b" \
            --fallback-model "nemotron-3-super" \
            --system "You are a defensive security reviewer. Use only the provided current code and tests. Do not invent components, hidden flows, or attack paths that require behavior not evidenced in the provided files. If a mitigation already exists, mark it mitigated and exclude it from open findings." \
            --prompt "Review the current HLF ALIGN Ledger and runtime/stdlib security surfaces and report only actionable findings supported by the provided code.

          Context:
          ${SEC_CONTEXT}

          Rules:
          - Use only the provided code as evidence.
          - Do not speculate about unshown tools, services, or registration paths.
          - If a suspected issue is already mitigated in the code, do not include it as an open finding.
          - If no actionable findings remain, output exactly: NO_ACTIONABLE_FINDINGS

          For each open finding, use this exact structure:
          1. NAME
          2. EVIDENCE: exact file and current behavior
          3. ATTACK_PATH
          4. IMPACT
          5. FIX

          Focus on current, unmitigated gaps only." \
            --output /tmp/security_review.json \
            --temperature 0.1

          python -c "import json; d=json.load(open('/tmp/security_review.json')); print(d['content'])" > /tmp/security_review.md

      - name: Gate security issue creation
        id: security_gate
        run: |
          python << 'PYEOF'
          import os
          from pathlib import Path

          text = Path('/tmp/security_review.md').read_text(encoding='utf-8').strip()
          actionable = 'NO_ACTIONABLE_FINDINGS' not in text and 'No actionable findings' not in text
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"has_findings={'true' if actionable else 'false'}\n")
          PYEOF

      - name: Create security issue
        if: steps.security_gate.outputs.has_findings == 'true' && github.ref_name == github.event.repository.default_branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          WEEK=$(date +"%Y-W%V")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SEC_REVIEW=$(cat /tmp/security_review.md)

          cat > /tmp/security_issue.md << ISSUE_EOF
          ## 🔐 HLF Security Pattern Review — ${WEEK}

          **Reviewed by**: \`deepseek-r1:14b\` (adversarial reasoning, thinking traces enabled)
          **Workflow**: [Weekly Doc + Security Review]($RUN_URL)

          > _Red-hat authorized review. All findings are for defensive improvement only._

          ---

          ## Adversarial Findings

          ${SEC_REVIEW}

          ---
          _Auto-generated weekly. Triage each finding. Close when all critical/high items are resolved._
          ISSUE_EOF

          python .github/scripts/create_github_issue.py \
            --title "🔐 [Security Review] HLF adversarial pattern analysis" \
            --body "@/tmp/security_issue.md" \
            --labels "security,adversarial,automated,priority-high" \
            --conflict-labels "security,adversarial" \
            --conflict-title-substrings "security review,adversarial pattern analysis"

      - name: Build governed review contract
        if: always()
        run: |
          python .github/scripts/governed_review_contract.py \
            build-security-patterns \
            --security-review /tmp/security_review.json \
            --output /tmp/governed_review.json

      - name: Emit normalized security artifact
        if: always()
        run: |
          python .github/scripts/emit_weekly_artifact.py \
            --source "weekly-security-patterns" \
            --output /tmp/weekly-security-patterns-artifact.json \
            --extra-json "/tmp/security_review.json:security_review" \
            --extra-json "/tmp/governed_review.json:governed_review"

      - name: Upload security patterns artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "weekly-security-patterns-${{ github.run_id }}"
          path: /tmp/weekly-security-patterns-artifact.json
          retention-days: 90
