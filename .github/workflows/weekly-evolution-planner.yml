# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  HLF — Weekly Evolution Planner                                              ║
# ║                                                                              ║
# ║  Stage 1 routing: packaged named planning chain                              ║
# ║  Why: strategic roadmap work should follow the strongest currently qualified ║
# ║       planning route, not a permanently hardcoded model identity.            ║
# ║                                                                              ║
# ║  Stage 2 routing: packaged named coding chain                                ║
# ║  Why: once the planner identifies WHAT to build, the coding step should use  ║
# ║       the strongest currently qualified implementation-focused route.         ║
# ║                                                                              ║
# ║  This is a 2-agent swarm within a single workflow — planning then coding.   ║
# ║                                                                              ║
# ║  Triggers: Weekly Monday 03:00 UTC (after spec sentinel runs Sunday)        ║
# ║  Output: GitHub Issue with roadmap analysis + code starters                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
name: "Weekly — Evolution Planner (policy-routed planning + coding swarm)"

on:
  schedule:
    - cron: "0 3 * * 1"   # Every Monday at 03:00 UTC
  workflow_dispatch:
    inputs:
      focus_area:
        description: "Optional focus area for the planner (e.g. 'ethics module', 'Phase 2')"
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  evolution-planner:
    name: "Swarm: planning chain plans -> coding chain drafts"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]" --quiet

      - name: Build full codebase snapshot
        run: |
          python .github/scripts/codebase_snapshot.py \
            --output /tmp/codebase_snapshot.txt \
            --budget 750000
          echo "Snapshot size: $(wc -c < /tmp/codebase_snapshot.txt) chars"

      - name: Run ethics compliance check
        run: |
          python .github/scripts/ethics_compliance_check.py > /tmp/ethics_report.json
          cat /tmp/ethics_report.json

      - name: Run test suite for baseline
        run: |
          pip install pytest --quiet
          python -m pytest tests/ -q --tb=short 2>&1 | tee /tmp/test_results.txt || true
          echo "Test output captured."

      - name: Write structured evolution schema
        run: |
          python .github/scripts/governed_review_contract.py \
            write-evolution-schema \
            --output /tmp/evolution_schema.json

      - name: "Agent 1 — planning chain: Strategic evolution planning"
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          FOCUS="${{ github.event.inputs.focus_area }}"
          FOCUS_LINE=""
          if [ -n "$FOCUS" ]; then
            FOCUS_LINE="The user has requested special focus on: ${FOCUS}"
          fi

          ETHICS_SUMMARY=$(python -c "import json; d=json.load(open('/tmp/ethics_report.json')); print(d.get('summary_text', 'No ethics report'))")
          TEST_RESULTS=$(cat /tmp/test_results.txt)

          cat > /tmp/planner_prompt.txt << PROMPT_EOF
          You are the HLF Evolution Planner. You have full read access to the entire HLF codebase below.
          Your role is to identify the most impactful next development steps that:
          1. Advance the stated Phase 2 goals (sqlite-vec, fractal summarisation, LSP, REPL, test runner)
          2. Address the ethics/governance stubs that are currently unimplemented
          3. Fix any structural gaps that would block production readiness
          4. Respect the core ethos: people-first, privacy-first, AI as tool, transparent governance

          ${FOCUS_LINE}

          Ethics Status:
          ${ETHICS_SUMMARY}

          Test Results:
          ${TEST_RESULTS}

          For each proposed evolution item, provide:
          - TITLE: Short, actionable name
          - WHY: Why this matters now (reference specific code or ethos)
          - IMPACT: High/Medium/Low + specific metric that would change
          - EFFORT: Small (1 day) / Medium (1 week) / Large (2+ weeks)
          - FIRST_STEP: The exact first file to modify and the first function to write
          - PHASE: Which roadmap phase (1/2/3/4/5) this belongs to

          Produce exactly 7 evolution items, ordered by priority × impact / effort ratio.
          Be precise and cite specific files and line numbers from the codebase where relevant.

          CODEBASE:
          PROMPT_EOF

          cat /tmp/codebase_snapshot.txt >> /tmp/planner_prompt.txt

          # Use the packaged named planning chain so weekly routing follows current policy.
          python .github/scripts/ollama_client.py \
            --chain "planning" \
            --system "You are the autonomous HLF Evolution Planner. You reason across the full codebase with long-horizon planning capability and produce precise, implementation-ready evolution plans that respect the HLF ethos of people-first, privacy-first governance." \
            --prompt "@/tmp/planner_prompt.txt" \
            --output /tmp/evolution_plan.json \
            --format-schema-file /tmp/evolution_schema.json \
            --temperature 0.15

          python -c "import json; d=json.load(open('/tmp/evolution_plan.json')); content=d['content']; print(json.dumps(content, indent=2) if isinstance(content, dict) else content)" > /tmp/evolution_plan.md
          MODEL_USED=$(python -c "import json; print(json.load(open('/tmp/evolution_plan.json'))['model'])")
          echo "PLANNER_MODEL=$MODEL_USED" >> $GITHUB_ENV
          echo "Evolution plan generated by $MODEL_USED ($(wc -c < /tmp/evolution_plan.md) chars)"

      - name: "Agent 2 — coding chain: Code starter drafts for top priority item"
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          EVOLUTION_PLAN=$(python -c "import json; d=json.load(open('/tmp/evolution_plan.json')); content=d['content']; print(json.dumps(content, indent=2) if isinstance(content, dict) else content)" | head -c 12000)

          python .github/scripts/ollama_client.py \
            --chain "coding" \
            --system "You are an HLF coding agent (devstral) specializing in Python and the HLF language stack. You write clean, non-reductive, fully-implemented code — no stubs, no TODOs, no placeholder comments. Every function you write is complete." \
            --prompt "Based on this evolution plan from the strategic planner, take the HIGHEST PRIORITY item and write the complete implementation starter code for it. Include:\n1. The exact file path to create or modify\n2. The complete function/class implementation (not stubs)\n3. Any new tests needed in tests/\n4. How it integrates with the existing architecture\n\nEvolution Plan:\n${EVOLUTION_PLAN}\n\nWrite production-quality Python 3.12+ code that follows the existing patterns in the HLF codebase." \
            --output /tmp/code_starter.json \
            --temperature 0.05
          
          python -c "import json; d=json.load(open('/tmp/code_starter.json')); print(d['content'])" > /tmp/code_starter.md
          echo "Code starter generated ($(wc -c < /tmp/code_starter.md) chars)"

      - name: Build governed review contract
        run: |
          FOCUS="${{ github.event.inputs.focus_area }}"
          python .github/scripts/governed_review_contract.py \
            build-evolution \
            --plan /tmp/evolution_plan.json \
            --code-starter /tmp/code_starter.json \
            --focus-area "$FOCUS" \
            --output /tmp/governed_review.json

      - name: Build GitHub issue
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          FOCUS="${{ github.event.inputs.focus_area }}"
          python .github/scripts/governed_review_contract.py \
            render-evolution-issue \
            --plan /tmp/evolution_plan.json \
            --code-starter /tmp/code_starter.json \
            --run-url "$RUN_URL" \
            --focus-area "$FOCUS" \
            --output /tmp/evolution_issue.md

      - name: Emit normalized weekly artifact
        if: always()
        run: |
          python .github/scripts/emit_weekly_artifact.py \
            --source "weekly-evolution-planner" \
            --output /tmp/weekly-evolution-planner-artifact.json \
            --extra-json "/tmp/ethics_report.json:ethics_report" \
            --extra-json "/tmp/evolution_plan.json:evolution_plan" \
            --extra-json "/tmp/code_starter.json:code_starter" \
            --extra-json "/tmp/governed_review.json:governed_review"

      - name: Upload normalized weekly artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "weekly-evolution-planner-${{ github.run_id }}"
          path: /tmp/weekly-evolution-planner-artifact.json
          retention-days: 90

      - name: Create GitHub issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          WEEK=$(date +"%Y-W%V")
          python .github/scripts/create_github_issue.py \
            --title "🧬 [Evolution Planner] HLF weekly evolution plan — ${WEEK}" \
            --body "@/tmp/evolution_issue.md" \
            --labels "evolution,automated,roadmap" \
            --conflict-labels "evolution,roadmap" \
            --conflict-title-substrings "evolution planner,weekly evolution plan"
