# ═══════════════════════════════════════════════════════════════════════════════
# HLF Model Substrate Configuration — Governed Provider Authority
# ═══════════════════════════════════════════════════════════════════════════════
#
# User-adjustable cloud model provider, routing, and escalation settings.
#
# Override precedence (highest first):
#   1. HLF_MODEL_CONFIG env var → path to user override TOML
#   2. ~/.hlf/model_providers.toml (per-user)
#   3. This file (governance authority default)
#
# All API keys are read from environment variables — never stored in config.
# ═══════════════════════════════════════════════════════════════════════════════

[meta]
version = "1.0"
description = "HLF cloud model substrate — Ollama Cloud + OpenRouter hybrid"

# ─────────────────────────────────────────────────────────────────────────────
# Provider Configuration
# ─────────────────────────────────────────────────────────────────────────────

[providers.ollama_cloud]
enabled = true
base_url = "https://ollama.com/api"
api_key_env = "OLLAMA_API_KEY"
priority = 1
timeout_connect_s = 20
timeout_read_s = 60
timeout_total_s = 600
max_retries = 3
backoff_base_s = 2.0
backoff_max_s = 90.0
circuit_breaker_threshold = 4
circuit_breaker_recovery_s = 300

[providers.openrouter]
enabled = true
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
priority = 2
timeout_connect_s = 20
timeout_read_s = 60
timeout_total_s = 300
max_retries = 3
backoff_base_s = 2.0
backoff_max_s = 90.0
circuit_breaker_threshold = 4
circuit_breaker_recovery_s = 300
# OpenRouter app identification headers
app_name = "HLF-MCP"
app_url = ""
# Prefer free-tier models when available (user's discretion)
prefer_free = false

# ─────────────────────────────────────────────────────────────────────────────
# Escalation Rules
# ─────────────────────────────────────────────────────────────────────────────

[escalation]
# "priority" — providers tried in priority order
# "round-robin" — rotate across providers
# "cost-optimized" — cheapest viable provider first
strategy = "priority"
fallback_on_auth_failure = false
fallback_on_rate_limit = true
fallback_on_model_not_found = true
fallback_on_timeout = true
fallback_on_server_error = true

# ─────────────────────────────────────────────────────────────────────────────
# Model Discovery
# ─────────────────────────────────────────────────────────────────────────────

[discovery]
# Auto-discover models from provider APIs at startup
auto_discover_ollama = true
auto_discover_openrouter = true
# Cache discovery results for this many seconds (0 = no cache)
discovery_cache_ttl_s = 3600
# OpenRouter model filters (empty = all models)
openrouter_family_filter = []
# Include free-tier OpenRouter models in discovery
openrouter_include_free = true
# Maximum models to discover per provider (0 = unlimited)
openrouter_max_models = 200

