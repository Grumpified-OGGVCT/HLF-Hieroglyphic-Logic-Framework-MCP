# HLF Tag Internationalisation Registry
# All aliases listed here are normalised to the canonical English tag in Pass 0.
# Languages: en (canonical) · fr · es · de · zh · ja · ar · pt
# ASCII glyph aliases (for users who cannot or prefer not to use Unicode glyphs)
#   are also registered here and folded to the canonical Unicode glyph at Pass 0.
#
# adding a language: add an ISO-639-1 key under the tag, list surface forms.
# All lookups are case-insensitive after NFKC normalisation.

version: "1.0"

# ── Glyph ASCII aliases ──────────────────────────────────────────────────────
# These are pre-glyph prefixes accepted in place of the Unicode glyph character.
# Format: ASCII_KEYWORD maps to the Unicode glyph.
glyph_aliases:
  ANALYZE:   "Δ"
  ANALYSE:   "Δ"    # British English
  ANALYSER:  "Δ"    # French verb form
  ANALIZAR:  "Δ"    # Spanish
  ENFORCE:   "Ж"
  CONSTRAIN: "Ж"
  JOIN:      "⨝"
  CONSENSUS: "⨝"
  VOTE:      "⨝"   # common alias
  CMD:       "⌘"
  COMMAND:   "⌘"
  DELEGATE:  "⌘"   # common alias at glyph level
  SOURCE:    "∇"
  PARAM:     "∇"   # common alias at glyph level
  PRIORITY:  "⩕"
  BRANCH:    "⊎"
  UNION:     "⊎"
  END:       "Ω"   # ASCII terminator alias
  OMEGA:     "Ω"

# ── Tag internationalisation ─────────────────────────────────────────────────
