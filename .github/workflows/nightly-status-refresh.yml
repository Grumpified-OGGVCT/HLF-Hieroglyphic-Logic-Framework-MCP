name: "Nightly Status Surface Refresh"

"on":
  schedule:
    # 07:00 UTC = 1:00 AM CST / 2:00 AM CDT
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Regenerate status surfaces
        run: python .github/scripts/generate_status_overview.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet docs/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/HLF_STATUS_OVERVIEW.md docs/index.html docs/merge-readiness.html docs/claims-ledger.html
          git commit -m "chore: nightly status surface refresh [skip ci]"
          git push
