# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  HLF — Weekly Test Health + Coverage Analysis                                ║
# ║                                                                              ║
# ║  Model: devstral:24b (Mistral × AllHands AI)                                ║
# ║  Best-in-class: Agentic coding, multi-file codebase comprehension           ║
# ║  Why: Test gap analysis IS a coding task — devstral understands the code    ║
# ║        paths that need exercising and writes the actual missing test stubs.  ║
# ║        It was trained specifically on SWE-Bench (real-world repo tasks),    ║
# ║        including identifying under-tested code paths.                        ║
# ║                                                                              ║
# ║  Stage 1: pytest + coverage (deterministic, no AI)                          ║
# ║  Stage 2: devstral:24b — analyze gaps, draft advisory test candidates       ║
# ║                                                                              ║
# ║  Triggers: Weekly Thursday 02:00 UTC                                        ║
# ║  Output: GitHub Issue with deterministic coverage + advisory AI candidates   ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
name: "Weekly — Test Health + Coverage (devstral:24b)"

on:
  schedule:
    - cron: "0 2 * * 4"   # Every Thursday at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  test-health:
    name: "Test coverage analysis + advisory AI test candidates"
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package + coverage tool
        run: |
          pip install -e ".[dev]" --quiet
          pip install pytest-cov --quiet

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=hlf_mcp \
            --cov-report=term-missing \
            --cov-report=json:/tmp/coverage.json \
            --tb=short \
            -q 2>&1 | tee /tmp/test_output.txt || true
          echo "EXIT_CODE=$?" >> $GITHUB_ENV
          cat /tmp/test_output.txt

      - name: Parse coverage report
        run: |
          python << 'PYEOF'
          import json
          from pathlib import Path

          cov_path = Path("/tmp/coverage.json")
          if not cov_path.exists():
              print("No coverage.json found — tests may have failed")
              Path("/tmp/coverage_summary.txt").write_text("Coverage data unavailable\n")
              exit(0)

          data = json.loads(cov_path.read_text())
          files = data.get("files", {})
          totals = data.get("totals", {})

          lines = [
              f"OVERALL COVERAGE: {totals.get('percent_covered', 0):.1f}%",
              f"  Covered lines: {totals.get('covered_lines', 0)}",
              f"  Missing lines: {totals.get('missing_lines', 0)}",
              f"  Total lines:   {totals.get('num_statements', 0)}",
              "",
              "PER-FILE BREAKDOWN (sorted by coverage %):",
          ]

          file_stats = []
          for path, info in files.items():
              summary = info.get("summary", {})
              pct = summary.get("percent_covered", 0)
              missing = summary.get("missing_lines", 0)
              total = summary.get("num_statements", 0)
              file_stats.append((pct, path, missing, total))

          file_stats.sort()  # Worst coverage first

          for pct, path, missing, total in file_stats:
              rel = path.replace(str(Path.cwd()) + "/", "")
              bar = "▓" * int(pct / 10) + "░" * (10 - int(pct / 10))
              lines.append(f"  {bar} {pct:5.1f}%  {rel}  (missing: {missing}/{total})")

          # Identify files with 0 coverage
          zero_cov = [path for pct, path, _, _ in file_stats if pct == 0.0]
          if zero_cov:
              lines.append("\nFILES WITH ZERO COVERAGE (highest risk):")
              for p in zero_cov:
                  lines.append(f"  ✗ {p.replace(str(Path.cwd()) + '/', '')}")

          # Find missing line numbers for critical files
          critical = ["compiler.py", "bytecode.py", "runtime.py", "server.py", "lifecycle.py", "memory.py"]
          lines.append("\nCRITICAL FILE MISSING LINES:")
          for path, info in files.items():
              for crit in critical:
                  if crit in path:
                      missing_nums = info.get("missing_lines", [])
                      if missing_nums:
                          rel = path.replace(str(Path.cwd()) + "/", "")
                          lines.append(f"  {rel}: lines {missing_nums[:20]}")

          result = "\n".join(lines)
          print(result)
          Path("/tmp/coverage_summary.txt").write_text(result)
          PYEOF

      - name: Gather uncovered source for AI analysis
        run: |
          python << 'PYEOF'
          import json
          from pathlib import Path

          cov_path = Path("/tmp/coverage.json")
          if not cov_path.exists():
              Path("/tmp/uncovered_code.txt").write_text("Coverage data unavailable\n")
              exit(0)

          data = json.loads(cov_path.read_text())
          files = data.get("files", {})

          output_lines = []
          char_budget = 25_000

          for path, info in sorted(files.items(), key=lambda x: x[1].get("summary", {}).get("percent_covered", 100)):
              pct = info.get("summary", {}).get("percent_covered", 100)
              if pct > 70:
                  continue  # Skip well-covered files
              rel = path.replace(str(Path.cwd()) + "/", "")
              missing = info.get("missing_lines", [])
              if not missing:
                  continue
              try:
                  src_lines = Path(path).read_text(encoding="utf-8").splitlines()
              except Exception:
                  continue
              output_lines.append(f"\n### {rel} ({pct:.1f}% coverage, {len(missing)} missing lines)\n")
              output_lines.append("Missing line numbers: " + str(missing[:30]) + "\n")
              output_lines.append("Source excerpt around missing lines:\n```python\n")
              shown = set()
              for ln in missing[:10]:
                  for i in range(max(0, ln - 3), min(len(src_lines), ln + 4)):
                      if i not in shown:
                          output_lines.append(f"{i+1:4}: {src_lines[i]}\n")
                          shown.add(i)
              output_lines.append("```\n")

              if sum(len(l) for l in output_lines) > char_budget:
                  output_lines.append("\n[TRUNCATED — budget limit reached]\n")
                  break

          result = "".join(output_lines)
          Path("/tmp/uncovered_code.txt").write_text(result or "All critical files are well covered.\n")
          print(f"Uncovered code excerpt: {len(result)} chars")
          PYEOF

          - name: Gather existing test context for dedupe review
          run: |
            python << 'PYEOF'
            import json
            from pathlib import Path

            cov_path = Path("/tmp/coverage.json")
            if not cov_path.exists():
              payload = {
                "status": "coverage_unavailable",
                "target_stems": [],
                "matched_test_files": [],
                "excerpt": "Coverage data unavailable; no existing test context gathered.\n",
              }
              Path("/tmp/existing_test_context.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
              Path("/tmp/existing_test_context.txt").write_text(payload["excerpt"], encoding="utf-8")
              raise SystemExit(0)

            data = json.loads(cov_path.read_text())
            files = data.get("files", {})
            ranked = sorted(
              files.items(),
              key=lambda item: item[1].get("summary", {}).get("percent_covered", 100),
            )
            target_stems = []
            for path, info in ranked:
              pct = info.get("summary", {}).get("percent_covered", 100)
              if pct > 70:
                continue
              stem = Path(path).stem
              if stem not in target_stems:
                target_stems.append(stem)
              if len(target_stems) >= 8:
                break

            matched = []
            excerpt_lines = []
            tests_root = Path("tests")
            for test_path in sorted(tests_root.rglob("test*.py")):
              try:
                text = test_path.read_text(encoding="utf-8")
              except Exception:
                continue
              if not any(stem in text or stem in test_path.stem for stem in target_stems):
                continue
              matched.append(str(test_path).replace('\\', '/'))
              excerpt_lines.append(f"## {test_path.as_posix()}\n")
              captured = 0
              for line in text.splitlines():
                stripped = line.strip()
                if stripped.startswith("def test_") or stripped.startswith("class Test") or stripped.startswith("from ") or stripped.startswith("import "):
                  excerpt_lines.append(f"{line}\n")
                  captured += 1
                if captured >= 20:
                  break
              excerpt_lines.append("\n")
              if len(matched) >= 8 or sum(len(line) for line in excerpt_lines) > 12000:
                break

            excerpt = "".join(excerpt_lines) or "No matching existing test context found for low-coverage modules.\n"
            payload = {
              "status": "ok",
              "target_stems": target_stems,
              "matched_test_files": matched,
              "excerpt": excerpt,
            }
            Path("/tmp/existing_test_context.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
            Path("/tmp/existing_test_context.txt").write_text(excerpt, encoding="utf-8")
            print(f"Existing test context: {len(matched)} files, {len(excerpt)} chars")
            PYEOF

      - name: "devstral:24b — Test gap analysis + advisory test drafting"
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          COVERAGE_SUMMARY=$(cat /tmp/coverage_summary.txt)
          UNCOVERED_CODE=$(cat /tmp/uncovered_code.txt)
          EXISTING_TEST_CONTEXT=$(cat /tmp/existing_test_context.txt)
          TEST_OUTPUT=$(tail -30 /tmp/test_output.txt)

          python .github/scripts/ollama_client.py \
            --model "devstral:24b" \
            --fallback-model "qwen3.5:cloud" \
            --system "You are an HLF test engineer producing governed advisory pytest recommendations for the HLF Python codebase. Deterministic coverage data is authoritative; your output is never merge-ready by itself. You must prefer extending existing suites over inventing new umbrella files, and you must call out duplicate-risk or fixture assumptions explicitly." \
            --prompt "Analyze the HLF test coverage and produce advisory test candidates for the highest-risk uncovered code paths.

          COVERAGE SUMMARY:
          ${COVERAGE_SUMMARY}

          RECENT TEST OUTPUT:
          ${TEST_OUTPUT}

          UNCOVERED CODE (excerpts of lines not hit by any test):
          ${UNCOVERED_CODE}

          EXISTING TEST CONTEXT (use this to avoid duplicating coverage already present):
          ${EXISTING_TEST_CONTEXT}

          Tasks:
          1. Identify the 3 highest-risk uncovered or weakly exercised paths (paths where a bug would cause silent data corruption, security bypass, or incorrect behavior)
          2. For each, explain why it is risky and whether the provided EXISTING TEST CONTEXT appears to overlap already
          3. For each, name the best destination test file. Prefer an existing test file whenever possible; only propose a new file when no suitable existing suite is visible
          4. Write a candidate pytest test function for each path. It should be concrete and assertion-heavy, but presented as advisory draft material that still requires local verification
          5. Follow these conventions:
             - Use the existing test patterns from the repo (see fixture-based tests in tests/)
             - Each test function starts with test_
             - Use descriptive names like test_set_stmt_emits_store_immut_not_mutable_store
             - Include edge cases, not just happy paths
             - Note which file the test belongs in
             - Call out any fixture or setup assumptions
             - Avoid duplicating behaviors that already appear covered in the EXISTING TEST CONTEXT

          Output format:
          - Risk summary
          - Candidate placement and overlap note for each item
          - Candidate test code blocks
          - Final caution note saying operator review and dedupe are required before commit." \
            --output /tmp/test_suggestions.json \
            --temperature 0.05

          python << 'PYEOF'
          import json
          from pathlib import Path

          suggestions_path = Path('/tmp/test_suggestions.json')
          context = json.loads(Path('/tmp/existing_test_context.json').read_text(encoding='utf-8'))
          payload = json.loads(suggestions_path.read_text(encoding='utf-8'))
          payload['existing_test_context'] = {
              'matched_test_files': context.get('matched_test_files', []),
              'target_stems': context.get('target_stems', []),
          }
          payload['context_digest'] = {
              'matched_test_file_count': len(context.get('matched_test_files', [])),
              'target_stem_count': len(context.get('target_stems', [])),
          }
          suggestions_path.write_text(json.dumps(payload, indent=2), encoding='utf-8')
          PYEOF

          python -c "import json; d=json.load(open('/tmp/test_suggestions.json')); print(d['content'])" > /tmp/test_suggestions.md
          echo "Test suggestions generated ($(wc -c < /tmp/test_suggestions.md) chars)"

      - name: Build issue body
        run: |
          WEEK=$(date +"%Y-W%V")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COVERAGE_SUMMARY=$(cat /tmp/coverage_summary.txt)
          TEST_SUGGESTIONS=$(cat /tmp/test_suggestions.md)
          TEST_OUTPUT=$(tail -20 /tmp/test_output.txt)

          cat > /tmp/test_issue.md << ISSUE_EOF
          ## 🧪 HLF Test Health Report — ${WEEK}

          **Coverage analysis**: deterministic (pytest-cov)
          **Test gap analysis + advisory drafting**: \`devstral:24b\` (Mistral × AllHands AI, SWE-Bench 46.8%)
          **Workflow**: [Weekly Test Health]($RUN_URL)

          ---

          ## Test Run Results

          \`\`\`
          ${TEST_OUTPUT}
          \`\`\`

          ---

          ## Coverage Summary

          \`\`\`
          ${COVERAGE_SUMMARY}
          \`\`\`

          ---

          ## AI Advisory Test Candidates (devstral:24b)

          > Deterministic coverage numbers above are authoritative.
          > The AI material below is advisory candidate code only, not merge-ready truth.
          > Review against existing tests first, prefer extending current suites, verify fixtures locally, then decide what actually belongs in a commit.

          ${TEST_SUGGESTIONS}

          ---
          _Auto-generated weekly. Close when reviewed test changes are committed and measured coverage improves._
          ISSUE_EOF

      - name: Build governed review contract
        if: always()
        run: |
          python .github/scripts/governed_review_contract.py \
            build-test-health \
            --coverage /tmp/coverage.json \
            --test-suggestions /tmp/test_suggestions.json \
            --output /tmp/governed_review.json

      - name: Emit normalized weekly artifact
        if: always()
        run: |
          python .github/scripts/emit_weekly_artifact.py \
            --source "weekly-test-health" \
            --output /tmp/weekly-test-health-artifact.json \
            --extra-json "/tmp/coverage.json:coverage" \
            --extra-json "/tmp/existing_test_context.json:existing_test_context" \
            --extra-json "/tmp/test_suggestions.json:test_suggestions" \
            --extra-json "/tmp/governed_review.json:governed_review"

      - name: Upload normalized weekly artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "weekly-test-health-${{ github.run_id }}"
          path: /tmp/weekly-test-health-artifact.json
          retention-days: 90

      - name: Create GitHub issue
        if: github.ref_name == github.event.repository.default_branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          WEEK=$(date +"%Y-W%V")
          python .github/scripts/create_github_issue.py \
            --title "🧪 [Test Health] HLF coverage + AI-generated tests" \
            --body "@/tmp/test_issue.md" \
            --labels "testing,automated,coverage" \
            --conflict-title-substrings "test health,coverage + ai-generated tests" \
            --conflict-labels "coverage"
